const FOODS={"oats":[389,17,66,7],"cooked oats":[71,2.5,12,1.4],"porridge":[71,2.5,12,1.4],"rolled oats":[389,17,66,7],"rice":[130,2.7,28,0.3],"white rice":[130,2.7,28,0.3],"basmati rice":[121,2.5,25,0.4],"brown rice":[111,2.6,23,0.9],"pasta":[157,5.8,31,0.9],"cooked pasta":[157,5.8,31,0.9],"bread":[265,9,49,3.2],"wholemeal bread":[247,13,41,3],"white bread":[265,9,49,3.2],"toast":[265,9,49,3.2],"potato":[77,2,17,0.1],"sweet potato":[86,1.6,20,0.1],"chicken":[165,31,0,3.6],"chicken breast":[165,31,0,3.6],"grilled chicken":[165,31,0,3.6],"chicken thigh":[209,26,0,11],"salmon":[208,20,0,13],"tuna":[116,26,0,1],"canned tuna":[116,26,0,1],"beef":[250,26,0,17],"mince":[250,26,0,17],"beef mince":[250,26,0,17],"egg":[155,13,1.1,11],"eggs":[155,13,1.1,11],"bacon":[215,25,0,13],"back bacon":[215,25,0,13],"rasher":[215,25,0,13],"protein powder":[400,80,8,6],"whey":[400,80,8,6],"whey protein":[400,80,8,6],"milk":[46,3.4,5,1.6],"whole milk":[61,3.2,4.8,3.3],"semi skimmed milk":[46,3.4,5,1.6],"skimmed milk":[34,3.4,5,0.2],"greek yogurt":[59,10,3.6,0.4],"greek yoghurt":[59,10,3.6,0.4],"yogurt":[97,3.5,4,7.8],"yoghurt":[97,3.5,4,7.8],"cheese":[403,25,1.3,33],"cheddar":[403,25,1.3,33],"butter":[717,0.9,0.1,81],"olive oil":[884,0,0,100],"oil":[884,0,0,100],"banana":[89,1.1,23,0.3],"apple":[52,0.3,14,0.2],"blueberries":[57,0.7,14,0.3],"blueberry":[57,0.7,14,0.3],"strawberries":[32,0.7,7.7,0.3],"strawberry":[32,0.7,7.7,0.3],"raspberries":[52,1.2,12,0.7],"mango":[60,0.8,15,0.4],"orange":[47,0.9,12,0.1],"avocado":[160,2,9,15],"broccoli":[34,2.8,7,0.4],"spinach":[23,2.9,3.6,0.4],"lettuce":[15,1.4,2.9,0.2],"tomato":[18,0.9,3.9,0.2],"cucumber":[16,0.7,3.6,0.1],"onion":[40,1.1,9.3,0.1],"salad":[20,1.5,3,0.3],"mixed salad":[20,1.5,3,0.3],"walnuts":[654,15,14,65],"walnut":[654,15,14,65],"almonds":[579,21,22,50],"almond":[579,21,22,50],"peanuts":[567,26,16,49],"cashews":[553,18,30,44],"peanut butter":[588,25,20,50],"honey":[304,0.3,82,0],"oat milk":[46,1,6.6,1.5],"almond milk":[17,0.6,1.5,1.1],"protein shake":[120,25,5,2],"protein bar":[350,20,42,10]};
const UNIT_G={"tbsp":15,"tablespoon":15,"tsp":5,"teaspoon":5,"cup":240,"scoop":30,"handful":30,"bowl":250,"large handful":50,"small handful":20};
const COUNT_G={"egg":55,"eggs":55,"banana":120,"bananas":120,"apple":182,"rasher":25,"rashers":25,"slice":35,"slices":35};
function getFoodGrams(t){t=t.toLowerCase().trim();let m;m=t.match(/(\d+(?:\.\d+)?)\s*g\b/);if(m)return+m[1];m=t.match(/(\d+(?:\.\d+)?)\s*kg\b/);if(m)return+m[1]*1000;m=t.match(/(\d+(?:\.\d+)?)\s*ml\b/);if(m)return+m[1];m=t.match(/^(\d+(?:\.\d+)?)\s+(tbsp|tablespoon|tsp|teaspoon|cup|scoop|handful|bowl)/i);if(m)return+m[1]*(UNIT_G[m[2].toLowerCase()]||15);m=t.match(/^(\d+)\s+(\w+)/);if(m){const w=m[2].toLowerCase();if(COUNT_G[w])return+m[1]*COUNT_G[w];}for(const[u,g]of Object.entries(UNIT_G)){if(t.includes(u))return g;}return null;}
function matchFoodDB(raw){const noQty=raw.toLowerCase().replace(/\d+(?:\.\d+)?\s*(?:g|kg|ml|oz)\b/gi,"").replace(/\b(tbsp|tablespoon|tsp|teaspoon|cup|scoop|handful|bowl|large|small)\b/gi,"").replace(/^\d+\s+/,"").replace(/\s+/g," ").trim();if(FOODS[noQty])return[noQty,FOODS[noQty]];const noArt=noQty.replace(/\b(of|the|a|an|some)\b/g,"").replace(/\s+/g," ").trim();if(FOODS[noArt])return[noArt,FOODS[noArt]];const clean=noArt.replace(/\b(grilled|boiled|baked|raw|fresh|mixed|whole|chopped|diced)\b/g,"").replace(/\s+/g," ").trim();if(FOODS[clean])return[clean,FOODS[clean]];const words=clean.split(" ").filter(Boolean);for(let l=words.length;l>=1;l--){for(const s of[words.slice(0,l).join(" "),words.slice(-l).join(" ")]){if(FOODS[s])return[s,FOODS[s]];}}for(const key of Object.keys(FOODS)){if(noArt.includes(key))return[key,FOODS[key]];}return null;}
function defGrams(raw,m){const t=raw.toLowerCase();if(t.includes("oil")||t.includes("butter"))return 10;if(t.includes("berr"))return 80;if(["banana","apple","orange","avocado"].some(f=>t.includes(f)))return 120;if(m[0]>500)return 25;return 100;}
function calcLocalNutrition(input){const items=input.split(/\s*(?:,|\band\b|\bwith\b|\+)\s*/i).map(s=>s.trim()).filter(s=>s.length>1);let cal=0,pro=0,carb=0,fat=0;const matched=[],unmatched=[];for(const item of items){const g=getFoodGrams(item);const res=matchFoodDB(item);if(res){const[name,m]=res;const grams=g!==null?g:defGrams(item,m);const f=grams/100;cal+=m[0]*f;pro+=m[1]*f;carb+=m[2]*f;fat+=m[3]*f;matched.push(name);}else{unmatched.push(item);}}return{calories:Math.round(cal),protein:Math.round(pro),carbs:Math.round(carb),fat:Math.round(fat),matched,unmatched,description:input.slice(0,70)};}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function todayKey(){return new Date().toISOString().split("T")[0];}
function getDayOfWeek(dk){const d=new Date(dk+"T12:00:00"),day=d.getDay();if(day===0||day===6)return null;return DAY_KEYS[day-1];}
function formatDate(dk){return new Date(dk+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});}
function r25(n){return Math.round(n/2.5)*2.5;}
function calcWarmups(topKg,defaults){
  if(defaults&&defaults.length)return defaults.map(w=>({kg:w.kg,reps:w.reps}));
  const w=parseFloat(topKg)||0;
  return[{kg:w>0?Math.max(r25(w*0.4),20):0,reps:8},{kg:w>0?r25(w*0.6):0,reps:5},{kg:w>0?r25(w*0.8):0,reps:3}];
}
function calcVolume(wLog,prog){if(!prog)return 0;let v=0;for(const ex of prog.exercises){const log=wLog[ex.id]||{};for(const s of(log.sets||[])){const w=parseFloat(s?.weight)||0;const r=parseInt(s?.reps)||0;if(w>0&&r>0)v+=w*r;}}return Math.round(v);}

function MacroRing({value,target,color,size=52,stroke=5}){const r=(size-stroke)/2,circ=2*Math.PI*r,pct=Math.min(value/target,1);return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#EDE8E0" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 0.5s"}}/></svg>);}

function Stepper({value,onDec,onInc,label,accent="#1A1A1A"}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1}}>
      {label&&<div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1}}>{label}</div>}
      <div style={{display:"flex",alignItems:"center",width:"100%"}}>
        <button onPointerDown={onDec} style={{flex:1,height:48,border:"1px solid #E0D9D0",borderRight:"none",borderRadius:"10px 0 0 10px",background:"#F5F1EB",fontSize:22,cursor:"pointer",color:"#555",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>−</button>
        <div style={{flex:2,height:48,border:"1px solid #E0D9D0",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"DM Mono,monospace",fontSize:15,fontWeight:700,color:accent,minWidth:0}}>{value}</div>
        <button onPointerDown={onInc} style={{flex:1,height:48,border:"1px solid #E0D9D0",borderLeft:"none",borderRadius:"0 10px 10px 0",background:"#F5F1EB",fontSize:22,cursor:"pointer",color:"#555",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>+</button>
      </div>
    </div>
  );
}

// localStorage storage polyfill (replaces window.storage from Claude artifacts)
window.storage = {
  get: async (key) => { try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch(e) { return null; } },
  set: async (key, value) => { try { localStorage.setItem(key, value); return { key, value }; } catch(e) { return null; } },
  delete: async (key) => { try { localStorage.removeItem(key); return { key, deleted: true }; } catch(e) { return null; } },
};

function App(){

  const[loaded,setLoaded]=useState(false);

    try{const r=await window.storage.get("dl8");if(r)setDailyLogs(JSON.parse(r.value));}catch{}
    try{const r=await window.storage.get("pr8");if(r)setPresets(JSON.parse(r.value));}catch{}
    try{const r=await window.storage.get("pg8");if(r)setProgramme(JSON.parse(r.value));}catch{}
    setLoaded(true);
  })();},[]);
  useEffect(()=>{if(loaded)window.storage.set("fl8",JSON.stringify(foodLogs)).catch(()=>{});},[foodLogs,loaded]);
  useEffect(()=>{if(loaded)window.storage.set("wl8",JSON.stringify(workoutLogs)).catch(()=>{});},[workoutLogs,loaded]);
  useEffect(()=>{if(loaded)window.storage.set("dl8",JSON.stringify(dailyLogs)).catch(()=>{});},[dailyLogs,loaded]);
  useEffect(()=>{if(loaded)window.storage.set("pr8",JSON.stringify(presets)).catch(()=>{});},[presets,loaded]);
  useEffect(()=>{if(loaded)window.storage.set("pg8",JSON.stringify(programme)).catch(()=>{});},[programme,loaded]);

  const dayOfWeek=getDayOfWeek(dateKey);
  const prog=dayOfWeek?programme[dayOfWeek]:null;
  const wLog=workoutLogs[dateKey]||{};
  const daily=dailyLogs[dateKey]||{};
  const dayFood=foodLogs[dateKey]||[];
  const totals=dayFood.reduce((a,i)=>({cal:a.cal+(i.calories||0),pro:a.pro+(i.protein||0),carb:a.carb+(i.carbs||0),fat:a.fat+(i.fat||0)}),{cal:0,pro:0,carb:0,fat:0});
  const remaining=CALORIE_TARGET-totals.cal;

  function setDaily(field,val){setDailyLogs(p=>({...p,[dateKey]:{...(p[dateKey]||{}),[field]:val}}));}
  function changeDate(delta){const d=new Date(dateKey+"T12:00:00");d.setDate(d.getDate()+delta);const nk=d.toISOString().split("T")[0];if(delta>0&&nk>todayKey())return;setDateKey(nk);}

  const tabs=[{id:"today",label:"TODAY"},{id:"workout",label:"WORKOUT"},{id:"food",label:"FOOD"},{id:"progress",label:"PROGRESS"}];

  return(
    <div style={{fontFamily:"Syne,sans-serif",background:"#F5F1EB",minHeight:"100vh",color:"#1A1A1A",maxWidth:480,margin:"0 auto",paddingBottom:40}}>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
      <div style={{background:"#1A1A1A",padding:"18px 16px 0",color:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <button onClick={()=>changeDate(-1)} style={{background:"none",border:"1px solid #2A2A2A",borderRadius:6,color:"#888",width:32,height:32,cursor:"pointer",fontSize:14}}>‹</button>
          <div style={{textAlign:"center"}}>
            {dateKey===todayKey()&&<div style={{fontSize:9,letterSpacing:3,color:"#E85D26",fontFamily:"DM Mono,monospace",marginBottom:2}}>● TODAY</div>}
            <div style={{fontSize:14,fontWeight:700}}>{formatDate(dateKey)}</div>
            {prog?<div style={{fontSize:9,letterSpacing:3,color:prog.color,fontFamily:"DM Mono,monospace",marginTop:2}}>{prog.emoji} {prog.label}</div>:<div style={{fontSize:9,letterSpacing:3,color:"#444",fontFamily:"DM Mono,monospace",marginTop:2}}>REST DAY</div>}
          </div>
          <button onClick={()=>changeDate(1)} style={{background:"none",border:"1px solid #2A2A2A",borderRadius:6,color:dateKey>=todayKey()?"#2A2A2A":"#888",width:32,height:32,cursor:"pointer",fontSize:14}}>›</button>
        </div>
        <div style={{display:"flex",marginTop:14}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?"#E85D26":"transparent"}`,padding:"9px 2px",fontSize:10,fontWeight:tab===t.id?700:400,letterSpacing:2,fontFamily:"DM Mono,monospace",color:tab===t.id?"#fff":"#555",cursor:"pointer",transition:"all 0.2s"}}>{t.label}</button>)}
        </div>
      </div>
      <div style={{padding:"14px 12px"}}>
        {tab==="today"&&<TodayTab daily={daily} setDaily={setDaily} totals={totals} remaining={remaining} prog={prog} wLog={wLog} workoutLogs={workoutLogs} dateKey={dateKey} dayOfWeek={dayOfWeek} setTab={setTab}/>}
        {tab==="workout"&&<WorkoutTab prog={prog} wLog={wLog} dateKey={dateKey} dayOfWeek={dayOfWeek} workoutLogs={workoutLogs} setWorkoutLogs={setWorkoutLogs} setTab={setTab} programme={programme} setProgramme={setProgramme} dayKey={dayOfWeek}/>}
        {tab==="food"&&<FoodTab dayFood={dayFood} dateKey={dateKey} setFoodLogs={setFoodLogs} presets={presets} setPresets={setPresets} totals={totals} remaining={remaining}/>}
        {tab==="progress"&&<ProgressTab foodLogs={foodLogs} dailyLogs={dailyLogs} baseDate={dateKey}/>}
      </div>
    </div>
  );
}

// ─── TODAY TAB ────────────────────────────────────────────────────────────────
function TodayTab({daily,setDaily,totals,remaining,prog,wLog,workoutLogs,dateKey,dayOfWeek,setTab}){
  const[bwInput,setBwInput]=useState(daily.bodyweight||"");
  const[bwSaved,setBwSaved]=useState(!!daily.bodyweight);
  useEffect(()=>{setBwInput(daily.bodyweight||"");setBwSaved(!!daily.bodyweight);},[dateKey]);

  function logWeight(){if(!bwInput)return;setDaily("bodyweight",bwInput);setBwSaved(true);}

  const todayVol=calcVolume(wLog,prog);
  const lastWeekKey=(()=>{const keys=Object.keys(workoutLogs).filter(k=>k<dateKey).sort().reverse();for(const k of keys){if(getDayOfWeek(k)===dayOfWeek)return k;}return null;})();
  const lastWeekVol=lastWeekKey?calcVolume(workoutLogs[lastWeekKey]||{},prog):0;
  const volDiff=lastWeekVol>0?Math.round((todayVol-lastWeekVol)/lastWeekVol*100):null;

  return(
    <div>
      {/* Bodyweight with LOG button */}
      <div style={{background:"#fff",borderRadius:14,padding:"14px",marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:8}}>MORNING WEIGH-IN</div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <input type="number" inputMode="decimal" placeholder="103.0" value={bwInput} onChange={e=>{setBwInput(e.target.value);setBwSaved(false);}}
            style={{flex:1,border:`1.5px solid ${bwSaved?"#2D7A4F":"#E8E2DA"}`,borderRadius:8,padding:"11px",fontSize:20,fontFamily:"DM Mono,monospace",background:"#F5F1EB",outline:"none",textAlign:"center",fontWeight:700}}/>
          <button onClick={logWeight} style={{padding:"11px 18px",background:bwSaved?"#2D7A4F":"#1A1A1A",color:"#fff",border:"none",borderRadius:8,fontFamily:"DM Mono,monospace",fontSize:11,fontWeight:700,letterSpacing:1,cursor:"pointer",flexShrink:0,transition:"background 0.2s"}}>
            {bwSaved?"✓ SAVED":"LOG"}
          </button>
        </div>
        <div style={{fontSize:9,color:"#CCC",fontFamily:"DM Mono,monospace",textAlign:"center",marginTop:6}}>kg · target 92–95kg by August</div>
      </div>

      {/* Calorie ring */}
      <div style={{background:"#fff",borderRadius:14,padding:"18px",marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{position:"relative",width:84,height:84,flexShrink:0}}>
            <svg width="84" height="84" viewBox="0 0 84 84"><circle cx="42" cy="42" r="34" fill="none" stroke="#EDE8E0" strokeWidth="9"/><circle cx="42" cy="42" r="34" fill="none" stroke={remaining<0?"#C0392B":"#E85D26"} strokeWidth="9" strokeDasharray={`${2*Math.PI*34}`} strokeDashoffset={`${2*Math.PI*34*(1-Math.min(totals.cal/CALORIE_TARGET,1))}`} strokeLinecap="round" transform="rotate(-90 42 42)" style={{transition:"stroke-dashoffset 0.6s"}}/></svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:"DM Mono,monospace",fontSize:15,fontWeight:600,lineHeight:1}}>{totals.cal||0}</div><div style={{fontSize:8,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1}}>KCAL</div></div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>Daily Calories</div>
            <div style={{fontFamily:"DM Mono,monospace",fontSize:20,fontWeight:500,color:remaining<0?"#C0392B":"#1A1A1A",lineHeight:1.1}}>{remaining>=0?remaining.toLocaleString():"+"+Math.abs(remaining)}</div>
            <div style={{fontSize:10,color:"#888",fontFamily:"DM Mono,monospace",marginBottom:4}}>{remaining>=0?"kcal remaining":"over target"}</div>
            <div style={{fontSize:9,color:"#CCC",fontFamily:"DM Mono,monospace"}}>Target: {CALORIE_TARGET} kcal</div>
          </div>
        </div>
      </div>

      {/* Macros */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {[{l:"PROTEIN",v:totals.pro,t:PROTEIN_TARGET,c:"#D4541A"},{l:"CARBS",v:totals.carb,t:CARB_TARGET,c:"#1A5C8A"},{l:"FAT",v:totals.fat,t:FAT_TARGET,c:"#7B5EA7"}].map(m=>(
          <div key={m.l} style={{background:"#fff",borderRadius:12,padding:"10px 8px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",textAlign:"center"}}>
            <MacroRing value={m.v} target={m.t} color={m.c}/>
            <div style={{fontFamily:"DM Mono,monospace",fontSize:14,fontWeight:600,marginTop:2}}>{Math.round(m.v)}<span style={{fontSize:9,color:"#AAA",fontWeight:400}}>g</span></div>
            <div style={{fontSize:8,color:"#AAA",letterSpacing:1,fontFamily:"DM Mono,monospace"}}>{m.l}</div>
            <div style={{fontSize:8,color:m.v>=m.t?"#2D7A4F":"#CCC",fontFamily:"DM Mono,monospace"}}>{m.v>=m.t?"✓":"/ "+m.t+"g"}</div>
          </div>
        ))}
      </div>

      {/* Volume comparison */}
      {prog&&(todayVol>0||lastWeekVol>0)&&(
        <div style={{background:"#fff",borderRadius:14,padding:"14px",marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:10}}>WORKOUT VOLUME</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:20}}>
            <div><div style={{fontFamily:"DM Mono,monospace",fontSize:24,fontWeight:800,color:prog.color,lineHeight:1}}>{todayVol.toLocaleString()}<span style={{fontSize:11,fontWeight:400,color:"#AAA"}}> kg</span></div><div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginTop:3}}>TODAY</div></div>
            {lastWeekVol>0&&<><div><div style={{fontFamily:"DM Mono,monospace",fontSize:16,color:"#888",lineHeight:1}}>{lastWeekVol.toLocaleString()}<span style={{fontSize:10,color:"#CCC"}}> kg</span></div><div style={{fontSize:9,color:"#CCC",fontFamily:"DM Mono,monospace",marginTop:3}}>LAST WEEK</div></div>{todayVol>0&&volDiff!==null&&<div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontFamily:"DM Mono,monospace",fontSize:16,fontWeight:800,color:todayVol>=lastWeekVol?"#2D7A4F":"#E85D26"}}>{todayVol>=lastWeekVol?"▲":"▼"} {Math.abs(volDiff)}%</div><div style={{fontSize:9,color:"#CCC",fontFamily:"DM Mono,monospace",marginTop:3}}>vs last week</div></div>}</>}
          </div>
        </div>
      )}

      {/* Workout CTA */}
      {prog?(
        <button onClick={()=>setTab("workout")} style={{width:"100%",background:"#fff",border:`2px solid ${prog.color}`,borderRadius:14,padding:"14px",cursor:"pointer",textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",WebkitTapHighlightColor:"transparent"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#1A1A1A"}}>{prog.emoji} {prog.label}</div>
          <div style={{fontSize:10,color:prog.color,fontFamily:"DM Mono,monospace",marginTop:4,letterSpacing:1}}>OPEN WORKOUT →</div>
        </button>
      ):(
        <div style={{background:"#fff",borderRadius:14,padding:"18px",textAlign:"center",color:"#AAA",fontSize:13,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>Rest day — recover, hit protein, sleep well 🛌</div>
      )}
    </div>
  );
}

// ─── WORKOUT TAB ──────────────────────────────────────────────────────────────
function WorkoutTab({prog,wLog,dateKey,dayOfWeek,workoutLogs,setWorkoutLogs,setTab,programme,setProgramme,dayKey}){
  const[exIdx,setExIdx]=useState(0);
  const[timerSecs,setTimerSecs]=useState(0);
  const[editMode,setEditMode]=useState(false);
  const[showAddEx,setShowAddEx]=useState(false);
  const[newEx,setNewEx]=useState({label:"",sets:"3",reps:"",bw:false,compound:false,topSet:false,hasWarmups:false,warmupRows:[{kg:"",reps:""},{kg:"",reps:""},{kg:"",reps:""}]});
  const timerRef=useRef(null);
  useEffect(()=>{setExIdx(0);setEditMode(false);setShowAddEx(false);},[dateKey]);
  useEffect(()=>()=>clearInterval(timerRef.current),[]);
  function tapTimer(){clearInterval(timerRef.current);setTimerSecs(0);timerRef.current=setInterval(()=>setTimerSecs(s=>s+1),1000);}
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  if(!prog)return<div style={{textAlign:"center",padding:48,color:"#AAA",fontSize:14}}>No session scheduled today.</div>;
  const exercises=prog.exercises;

  function removeExercise(id){if(!dayKey)return;setProgramme(p=>({...p,[dayKey]:{...p[dayKey],exercises:p[dayKey].exercises.filter(e=>e.id!==id)}}))}
  function addExercise(){
    if(!newEx.label.trim()||!dayKey)return;
    const warmups=newEx.hasWarmups?newEx.warmupRows.filter(r=>r.kg).map(r=>({kg:parseFloat(r.kg)||0,reps:parseInt(r.reps)||5})):[];
    const ex={id:"u"+Date.now(),label:newEx.label.trim(),sets:parseInt(newEx.sets)||3,reps:newEx.reps||"10",bw:newEx.bw,compound:newEx.compound,topSet:newEx.topSet,defaultWarmups:warmups,defaultSets:[]};
    setProgramme(p=>({...p,[dayKey]:{...p[dayKey],exercises:[...p[dayKey].exercises,ex]}}));
    setNewEx({label:"",sets:"3",reps:"",bw:false,compound:false,topSet:false,hasWarmups:false,warmupRows:[{kg:"",reps:""},{kg:"",reps:""},{kg:"",reps:""}]});
    setShowAddEx(false);
  }
  function updateWarmupRow(i,field,val){setNewEx(p=>{const rows=[...p.warmupRows];rows[i]={...rows[i],[field]:val};return{...p,warmupRows:rows};});}

  const allDone=exercises.every(e=>wLog[e.id]?.done);
  if(allDone)return(
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:48,marginBottom:12}}>🎉</div>
      <div style={{fontWeight:800,fontSize:22,marginBottom:8}}>Session Complete</div>
      <div style={{fontSize:13,color:"#888",fontFamily:"DM Mono,monospace",marginBottom:24}}>{exercises.length} exercises logged</div>
      <button onClick={()=>setTab("today")} style={{padding:"14px 32px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:12,fontFamily:"DM Mono,monospace",fontSize:12,fontWeight:700,letterSpacing:2,cursor:"pointer"}}>← BACK TO TODAY</button>
    </div>
  );

  const INP={width:"100%",border:"1px solid #E8E2DA",borderRadius:8,padding:"9px",fontSize:13,fontFamily:"DM Mono,monospace",background:"#F5F1EB",outline:"none",boxSizing:"border-box",marginBottom:8};

  if(editMode)return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14}}>{prog.emoji} {prog.label}</div>
        <button onClick={()=>{setEditMode(false);setShowAddEx(false);}} style={{background:prog.color,border:"none",borderRadius:8,color:"#fff",padding:"6px 14px",fontFamily:"DM Mono,monospace",fontSize:10,cursor:"pointer",fontWeight:700,letterSpacing:1}}>DONE</button>
      </div>
      {exercises.map(ex=>(
        <div key={ex.id} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:10,padding:"12px 14px",marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{ex.label}</div><div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#AAA",marginTop:2}}>{ex.sets} sets × {ex.reps}</div></div>
          <button onClick={()=>removeExercise(ex.id)} style={{background:"#FFF0F0",border:"1px solid #F5C6C6",borderRadius:8,color:"#C0392B",padding:"6px 12px",fontFamily:"DM Mono,monospace",fontSize:10,cursor:"pointer",fontWeight:700,flexShrink:0}}>REMOVE</button>
        </div>
      ))}
      {!showAddEx?(
        <button onClick={()=>setShowAddEx(true)} style={{width:"100%",padding:"13px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:12,fontFamily:"DM Mono,monospace",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",marginTop:4}}>+ ADD EXERCISE</button>
      ):(
        <div style={{background:"#fff",borderRadius:12,padding:"14px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",marginTop:4}}>
          <div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:10}}>NEW EXERCISE</div>
          <input placeholder="Exercise name *" value={newEx.label} onChange={e=>setNewEx(p=>({...p,label:e.target.value}))} style={{...INP}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <input type="number" placeholder="Sets (e.g. 3)" value={newEx.sets} onChange={e=>setNewEx(p=>({...p,sets:e.target.value}))} style={{...INP,marginBottom:0}}/>
            <input placeholder="Reps (e.g. 8–12)" value={newEx.reps} onChange={e=>setNewEx(p=>({...p,reps:e.target.value}))} style={{...INP,marginBottom:0}}/>
          </div>
          {/* Toggles */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {[["Bodyweight","bw"],["Compound","compound"],["Top Set","topSet"],["Has Warm-ups","hasWarmups"]].map(([lbl,field])=>(
              <button key={field} onClick={()=>setNewEx(p=>({...p,[field]:!p[field]}))} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${newEx[field]?"#1A1A1A":"#E0D9D0"}`,background:newEx[field]?"#1A1A1A":"#fff",color:newEx[field]?"#fff":"#888",fontFamily:"DM Mono,monospace",fontSize:9,cursor:"pointer",letterSpacing:0.5,flexShrink:0}}>{lbl}</button>
            ))}
          </div>
          {/* Warm-up rows */}
          {newEx.hasWarmups&&(
            <div style={{background:"#F8F5F0",borderRadius:10,padding:"10px",marginBottom:12,border:"1px solid #EDE8E0"}}>
              <div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:8}}>WARM-UP SETS (kg × reps)</div>
              {newEx.warmupRows.map((row,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
                  <input type="number" placeholder={`WU${i+1} kg`} value={row.kg} onChange={e=>updateWarmupRow(i,"kg",e.target.value)} style={{border:"1px solid #E8E2DA",borderRadius:7,padding:"7px",fontSize:13,fontFamily:"DM Mono,monospace",background:"#fff",outline:"none",boxSizing:"border-box"}}/>
                  <input type="number" placeholder="reps" value={row.reps} onChange={e=>updateWarmupRow(i,"reps",e.target.value)} style={{border:"1px solid #E8E2DA",borderRadius:7,padding:"7px",fontSize:13,fontFamily:"DM Mono,monospace",background:"#fff",outline:"none",boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowAddEx(false)} style={{flex:1,padding:"10px",background:"#F5F1EB",border:"1px solid #E0D9D0",borderRadius:9,fontFamily:"DM Mono,monospace",fontSize:10,cursor:"pointer",color:"#888"}}>CANCEL</button>
            <button onClick={addExercise} disabled={!newEx.label.trim()} style={{flex:2,padding:"10px",background:newEx.label.trim()?"#2D7A4F":"#CCC",color:"#fff",border:"none",borderRadius:9,fontFamily:"DM Mono,monospace",fontSize:10,fontWeight:700,letterSpacing:1,cursor:"pointer"}}>ADD EXERCISE</button>
          </div>
        </div>
      )}
    </div>
  );

  const ci=Math.min(exIdx,exercises.length-1);
  const ex=exercises[ci];
  const log=wLog[ex.id]||{};
  const C=prog.color;

  // Find previous session for this exercise — used to pre-fill steppers
  function getPrev(){
    const progKey=Object.keys(programme).find(k=>programme[k].exercises.some(e=>e.id===ex.id));
    const keys=Object.keys(workoutLogs).filter(k=>k<dateKey).sort().reverse();
    for(const k of keys){const d=new Date(k+"T12:00:00"),day=d.getDay();if(day===0||day===6)continue;if(DAY_KEYS[day-1]===progKey){const s=(workoutLogs[k]?.[ex.id]?.sets||[]).filter(s=>s?.reps||s?.weight);if(s.length)return{dateKey:k,sets:s};}}
    return null;
  }
  const prev=getPrev();

  // Value resolution: today logged → prev session → programme default → 0
  function getSetVal(si,field){
    const logged=log.sets?.[si]?.[field];
    if(logged!==undefined&&logged!==0)return logged;
    // Previous session carry-over
    if(prev&&prev.sets[si]?.[field])return prev.sets[si][field];
    // Programme defaults
    if(ex.defaultSets?.[si]?.[field])return ex.defaultSets[si][field];
    return 0;
  }

  function adjustSet(si,field,delta){
    setWorkoutLogs(p=>{
      const day=p[dateKey]||{},exLog=day[ex.id]||{};
      const sets=[...(exLog.sets||[])];
      // seed from resolved value if not yet set
      const cur=sets[si]?.[field]!==undefined?sets[si][field]:getSetVal(si,field);
      const next=field==="weight"?Math.max(0,r25(cur+delta)):Math.max(0,cur+delta);
      sets[si]={...(sets[si]||{}),[field]:next};
      let updates={sets};
      if(si===0&&field==="weight"&&ex.topSet&&ex.compound&&!ex.bw&&!exLog.warmupsManual){
        updates.warmups=calcWarmups(next,ex.defaultWarmups);
      }
      return{...p,[dateKey]:{...day,[ex.id]:{...exLog,...updates}}};
    });
  }
  function adjustWarmup(wi,delta){
    setWorkoutLogs(p=>{
      const day=p[dateKey]||{},exLog=day[ex.id]||{};
      const topW=getSetVal(0,"weight");
      const base=exLog.warmups||calcWarmups(topW,ex.defaultWarmups);
      const warmups=[...base];
      warmups[wi]={...warmups[wi],kg:Math.max(0,r25((warmups[wi]?.kg||0)+delta))};
      return{...p,[dateKey]:{...day,[ex.id]:{...exLog,warmups,warmupsManual:true}}};
    });
  }
  function completeEx(){
    setWorkoutLogs(p=>({...p,[dateKey]:{...(p[dateKey]||{}),[ex.id]:{...(p[dateKey]?.[ex.id]||{}),done:true}}}));
    const willAllBeDone=exercises.every((e,i)=>i===ci||wLog[e.id]?.done);
    if(ci>=exercises.length-1||willAllBeDone){setTab("today");return;}
    const next=exercises.findIndex((e,i)=>i>ci&&!wLog[e.id]?.done);
    setExIdx(next>=0?next:ci+1);
  }

  const topWeight=getSetVal(0,"weight");
  const warmups=(ex.topSet&&ex.compound&&!ex.bw)?(log.warmups||calcWarmups(topWeight,ex.defaultWarmups)):[];
  const backoffKg=topWeight>0?r25(topWeight*0.88):0;

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{flex:1,height:4,background:"#E8E2DA",borderRadius:2}}>
          <div style={{height:4,borderRadius:2,background:C,width:`${(exercises.filter(e=>wLog[e.id]?.done).length/exercises.length)*100}%`,transition:"width 0.4s"}}/>
        </div>
        <div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#888",flexShrink:0}}>{exercises.filter(e=>wLog[e.id]?.done).length}/{exercises.length}</div>
        <button onClick={()=>setEditMode(true)} style={{background:"none",border:"1px solid #E0D9D0",borderRadius:8,color:"#AAA",padding:"4px 10px",fontFamily:"DM Mono,monospace",fontSize:9,cursor:"pointer",letterSpacing:1,flexShrink:0}}>EDIT</button>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",justifyContent:"center"}}>
        {exercises.map((e,i)=>(
          <button key={e.id} onClick={()=>setExIdx(i)} style={{width:28,height:28,borderRadius:"50%",border:`2px solid ${i===ci?C:"#E0D9D0"}`,background:wLog[e.id]?.done?C:i===ci?"#fff":"#F5F1EB",cursor:"pointer",fontSize:10,fontFamily:"DM Mono,monospace",color:wLog[e.id]?.done?"#fff":i===ci?C:"#AAA",fontWeight:700,WebkitTapHighlightColor:"transparent"}}>{wLog[e.id]?.done?"✓":i+1}</button>
        ))}
      </div>

      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",overflow:"hidden",marginBottom:12}}>
        <div style={{background:C,padding:"14px 16px"}}>
          <div style={{color:"rgba(255,255,255,0.65)",fontFamily:"DM Mono,monospace",fontSize:9,letterSpacing:2,marginBottom:4}}>EXERCISE {ci+1} OF {exercises.length}</div>
          <div style={{color:"#fff",fontWeight:800,fontSize:18,lineHeight:1.2}}>{ex.label}</div>
          <div style={{color:"rgba(255,255,255,0.65)",fontFamily:"DM Mono,monospace",fontSize:11,marginTop:4}}>{ex.sets} sets × {ex.reps}</div>
          {ex.note&&<div style={{color:"rgba(255,255,255,0.55)",fontFamily:"DM Mono,monospace",fontSize:10,marginTop:4,fontStyle:"italic"}}>{ex.note}</div>}
        </div>

        <div style={{padding:"14px"}}>
          {/* Previous session carry-over notice */}
          {prev&&(
            <div style={{background:"#F0F7FF",borderRadius:10,padding:"10px 12px",marginBottom:14,border:"1px solid #D0E8FF"}}>
              <div style={{fontSize:9,color:"#1A5C8A",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:6}}>LAST WEEK — BEAT THIS</div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                {prev.sets.filter(s=>s?.reps||s?.weight).map((s,i)=><div key={i} style={{fontFamily:"DM Mono,monospace",fontSize:12,color:"#1A5C8A",fontWeight:600}}>S{i+1}: {s.weight?`${s.weight}kg`:"BW"} × {s.reps||"—"}</div>)}
              </div>
            </div>
          )}

          {/* Warm-ups */}
          {ex.topSet&&ex.compound&&!ex.bw&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:8}}>WARM-UP SETS</div>
              {warmups.map((wu,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,padding:"8px 10px",background:"#F8F5F0",borderRadius:9,border:"1px solid #EDE8E0"}}>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#AAA",width:28,flexShrink:0}}>WU{i+1}</div>
                  <div style={{display:"flex",flex:1,alignItems:"center"}}>
                    <button onPointerDown={()=>adjustWarmup(i,-2.5)} style={{width:34,height:34,borderRadius:"7px 0 0 7px",border:"1px solid #E0D9D0",borderRight:"none",background:"#F5F1EB",fontSize:18,cursor:"pointer",color:"#555",WebkitTapHighlightColor:"transparent"}}>−</button>
                    <div style={{flex:1,height:34,border:"1px solid #E0D9D0",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"DM Mono,monospace",fontSize:13,fontWeight:700,color:"#555"}}>{wu.kg>0?`${wu.kg}kg`:"—"}</div>
                    <button onPointerDown={()=>adjustWarmup(i,2.5)} style={{width:34,height:34,borderRadius:"0 7px 7px 0",border:"1px solid #E0D9D0",borderLeft:"none",background:"#F5F1EB",fontSize:18,cursor:"pointer",color:"#555",WebkitTapHighlightColor:"transparent"}}>+</button>
                  </div>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#AAA",width:22,textAlign:"right",flexShrink:0}}>×{wu.reps}</div>
                </div>
              ))}
              <div style={{borderTop:`2px dashed ${C}`,margin:"10px 0 12px",opacity:0.25}}/>
            </div>
          )}

          {/* Working sets */}
          <div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:10}}>{ex.topSet&&ex.compound?"WORKING SETS":"SETS"}</div>
          {Array.from({length:ex.sets},(_,i)=>{
            const isTop=ex.topSet&&ex.compound&&i===0;
            const w=getSetVal(i,"weight");
            const rp=getSetVal(i,"reps");
            const wDisplay=w===0?(ex.bw?"BW":"0 kg"):`${w} kg`;
            const suggested=!isTop&&ex.topSet&&ex.compound&&!ex.bw&&backoffKg>0&&(log.sets?.[i]?.weight===undefined);
            return(
              <div key={i} style={{marginBottom:10,padding:"12px",background:isTop?"#FFFAF7":"#FAFAFA",borderRadius:12,border:isTop?`1.5px solid ${C}`:"1.5px solid #EDE8E0"}}>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:10,fontWeight:700,color:isTop?C:"#888",marginBottom:8}}>{isTop?"S1 — TOP SET":suggested?`S${i+1}  (backoff ~${backoffKg}kg)`:`S${i+1}`}</div>
                <div style={{display:"flex",gap:8}}>
                  {!ex.bw&&<Stepper value={wDisplay} onDec={()=>adjustSet(i,"weight",-2.5)} onInc={()=>adjustSet(i,"weight",2.5)} label="WEIGHT" accent={isTop?C:"#1A1A1A"}/>}
                  <Stepper value={rp===0?"—":String(rp)} onDec={()=>adjustSet(i,"reps",-1)} onInc={()=>adjustSet(i,"reps",1)} label="REPS" accent={isTop?C:"#1A1A1A"}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Timer */}
      <div style={{background:"#1A1A1A",borderRadius:14,padding:"14px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:16}}>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:"#555",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:4}}>REST TIMER</div>
          <div style={{fontFamily:"DM Mono,monospace",fontSize:32,fontWeight:700,color:timerSecs>180?"#E85D26":timerSecs>0?"#2D7A4F":"#333",lineHeight:1,letterSpacing:2}}>{fmt(timerSecs)}</div>
        </div>
        <button onPointerDown={tapTimer} style={{width:64,height:64,borderRadius:"50%",background:timerSecs>0?"#2D7A4F":"#2A2A2A",border:"none",color:"#fff",fontSize:11,fontWeight:700,fontFamily:"DM Mono,monospace",cursor:"pointer",letterSpacing:1,WebkitTapHighlightColor:"transparent",flexShrink:0,transition:"background 0.2s"}}>{timerSecs>0?"RESET":"START"}</button>
      </div>
      <button onPointerDown={completeEx} style={{width:"100%",padding:"16px",background:C,color:"#fff",border:"none",borderRadius:14,fontSize:13,fontWeight:800,fontFamily:"DM Mono,monospace",letterSpacing:2,cursor:"pointer",WebkitTapHighlightColor:"transparent",boxShadow:`0 4px 20px ${C}55`,marginBottom:8}}>{ci===exercises.length-1?"FINISH SESSION →":"COMPLETE & NEXT →"}</button>
      <div style={{textAlign:"center"}}><button onClick={()=>setExIdx(Math.min(ci+1,exercises.length-1))} style={{background:"none",border:"none",color:"#AAA",fontFamily:"DM Mono,monospace",fontSize:10,cursor:"pointer",letterSpacing:1}}>SKIP THIS EXERCISE</button></div>
    </div>
  );
}

// ─── FOOD TAB ─────────────────────────────────────────────────────────────────
const CATEGORIES=["All","Breakfast","Snacks","Lunch","Dinner"];
function FoodTab({dayFood,dateKey,setFoodLogs,presets,setPresets,totals,remaining}){
  const[cat,setCat]=useState("All");
  const[foodInput,setFoodInput]=useState("");
  const[manualCal,setManualCal]=useState("");
  const[foodError,setFoodError]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[newMeal,setNewMeal]=useState({name:"",category:"Breakfast",calories:"",protein:"",carbs:"",fat:""});
  const filtered=presets.filter(p=>cat==="All"||p.category===cat);
  function addPreset(p){setFoodLogs(prev=>({...prev,[dateKey]:[...(prev[dateKey]||[]),{description:p.name,calories:p.calories,protein:p.protein,carbs:p.carbs,fat:p.fat,id:Date.now()}]}));}
  function analyseFood(){
    if(!foodInput.trim())return;setFoodError("");
    const override=parseInt(manualCal);const result=calcLocalNutrition(foodInput);
    const entry={description:result.description,calories:(!isNaN(override)&&override>0)?override:result.calories,protein:result.protein,carbs:result.carbs,fat:result.fat,id:Date.now()};
    if(entry.calories===0){setFoodError('Couldn\'t recognise. Try: "150g chicken, 200g rice"');return;}
    setFoodLogs(p=>({...p,[dateKey]:[...(p[dateKey]||[]),entry]}));setFoodInput("");setManualCal("");
    if(result.unmatched.length>0)setFoodError("Added — couldn\'t identify: "+result.unmatched.join(", "));
  }
  function saveNewMeal(){
    if(!newMeal.name||!newMeal.calories)return;
    const m={id:"u"+Date.now(),category:newMeal.category,name:newMeal.name,calories:+newMeal.calories,protein:+newMeal.protein||0,carbs:+newMeal.carbs||0,fat:+newMeal.fat||0};
    setPresets(p=>[...p,m]);setNewMeal({name:"",category:"Breakfast",calories:"",protein:"",carbs:"",fat:""});setShowAdd(false);
  }
  const INP={width:"100%",border:"1px solid #E8E2DA",borderRadius:8,padding:"9px",fontSize:13,fontFamily:"DM Mono,monospace",background:"#F5F1EB",outline:"none",boxSizing:"border-box"};
  let running=0;
  const coloredFood=dayFood.map(item=>{running+=item.calories;return{...item,over:running>CALORIE_TARGET};});
  return(
    <div>
      <div style={{background:"#fff",borderRadius:14,padding:"14px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace"}}>YOUR MEALS</div>
          <button onClick={()=>setShowAdd(s=>!s)} style={{background:"#1A1A1A",border:"none",borderRadius:8,color:"#fff",padding:"5px 12px",fontFamily:"DM Mono,monospace",fontSize:10,cursor:"pointer",letterSpacing:1,fontWeight:700}}>{showAdd?"CANCEL":"+ ADD MEAL"}</button>
        </div>
        {showAdd&&(
          <div style={{background:"#F8F5F0",borderRadius:10,padding:"12px",marginBottom:12,border:"1px solid #EDE8E0"}}>
            <div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1,marginBottom:10}}>NEW MEAL</div>
            <input placeholder="Meal name" value={newMeal.name} onChange={e=>setNewMeal(p=>({...p,name:e.target.value}))} style={{...INP,marginBottom:8}}/>
            <select value={newMeal.category} onChange={e=>setNewMeal(p=>({...p,category:e.target.value}))} style={{...INP,marginBottom:8}}>
              {["Breakfast","Snacks","Lunch","Dinner"].map(c=><option key={c}>{c}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {[["Calories *","calories"],["Protein (g)","protein"],["Carbs (g)","carbs"],["Fat (g)","fat"]].map(([lbl,field])=>(
                <div key={field}><div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:4}}>{lbl}</div><input type="number" value={newMeal[field]} onChange={e=>setNewMeal(p=>({...p,[field]:e.target.value}))} style={{...INP}}/></div>
              ))}
            </div>
            <button onClick={saveNewMeal} disabled={!newMeal.name||!newMeal.calories} style={{width:"100%",padding:"10px",background:!newMeal.name||!newMeal.calories?"#CCC":"#2D7A4F",color:"#fff",border:"none",borderRadius:9,fontFamily:"DM Mono,monospace",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer"}}>SAVE MEAL</button>
          </div>
        )}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12,WebkitOverflowScrolling:"touch"}}>
          {CATEGORIES.map(c=><button key={c} onClick={()=>setCat(c)} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:`1px solid ${cat===c?"#1A1A1A":"#E0D9D0"}`,background:cat===c?"#1A1A1A":"#fff",color:cat===c?"#fff":"#666",fontFamily:"DM Mono,monospace",fontSize:10,cursor:"pointer",transition:"all 0.15s"}}>{c}</button>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {filtered.map(p=>(
            <button key={p.id} onClick={()=>addPreset(p)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#F8F5F0",borderRadius:10,border:"1px solid #EDE8E0",cursor:"pointer",textAlign:"left",width:"100%",WebkitTapHighlightColor:"transparent"}}>
              <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13,color:"#1A1A1A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div><div style={{fontFamily:"DM Mono,monospace",fontSize:9,color:"#999",marginTop:2}}>P {p.protein}g · C {p.carbs}g · F {p.fat}g</div></div>
              <div style={{flexShrink:0,textAlign:"right"}}><div style={{fontFamily:"DM Mono,monospace",fontSize:16,fontWeight:700,color:"#E85D26",lineHeight:1}}>{p.calories}</div><div style={{fontSize:8,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1}}>KCAL</div></div>
              <div style={{color:"#2D7A4F",fontSize:18,flexShrink:0,fontWeight:300}}>+</div>
            </button>
          ))}
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"14px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:10}}>LOG MANUALLY</div>
        <textarea value={foodInput} onChange={e=>setFoodInput(e.target.value)} placeholder="e.g. 150g chicken breast, 200g white rice, 1 tbsp olive oil" rows={3} style={{width:"100%",border:"1px solid #E8E2DA",borderRadius:9,padding:"11px 13px",fontSize:13,fontFamily:"Syne,sans-serif",background:"#F5F1EB",outline:"none",resize:"none",lineHeight:1.6,boxSizing:"border-box",color:"#1A1A1A",marginBottom:8}}/>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:5,letterSpacing:1}}>OVERRIDE CALORIES (optional)</div>
          <input type="number" inputMode="numeric" placeholder="e.g. 650" value={manualCal} onChange={e=>setManualCal(e.target.value)} style={{width:"100%",border:"1px solid #E8E2DA",borderRadius:8,padding:"9px",fontSize:14,fontFamily:"DM Mono,monospace",background:"#F5F1EB",outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
        </div>
        <button onClick={analyseFood} disabled={!foodInput.trim()} style={{width:"100%",background:!foodInput.trim()?"#CCC":"#E85D26",color:"#fff",border:"none",borderRadius:9,padding:"13px",fontSize:11,fontWeight:700,letterSpacing:2,cursor:!foodInput.trim()?"default":"pointer",fontFamily:"DM Mono,monospace",transition:"background 0.2s"}}>CALCULATE + ADD</button>
        {foodError&&<div style={{marginTop:8,fontSize:10,color:"#C0392B",fontFamily:"DM Mono,monospace",background:"#FFF0F0",padding:"8px 10px",borderRadius:7,border:"1px solid #F5C6C6"}}>{foodError}</div>}
      </div>
      {coloredFood.length>0&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:10}}>TODAY\'S LOG</div>
          {coloredFood.map(item=>(
            <div key={item.id} style={{background:item.over?"#FFF4F0":"#F0FBF4",borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1.5px solid ${item.over?"#F5C6A0":"#A8DFB8"}`,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.description}</div><div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#888"}}>P {Math.round(item.protein)}g · C {Math.round(item.carbs)}g · F {Math.round(item.fat)}g</div></div>
              <div style={{textAlign:"right",flexShrink:0}}><div style={{fontFamily:"DM Mono,monospace",fontSize:18,fontWeight:700,color:item.over?"#C0392B":"#2D7A4F",lineHeight:1}}>{item.calories}</div><div style={{fontSize:8,color:"#AAA",fontFamily:"DM Mono,monospace",letterSpacing:1}}>KCAL</div></div>
              <button onClick={()=>setFoodLogs(p=>({...p,[dateKey]:(p[dateKey]||[]).filter(i=>i.id!==item.id)}))} style={{background:"none",border:"none",color:"#CCC",fontSize:20,cursor:"pointer",padding:"4px",flexShrink:0,lineHeight:1}}>×</button>
            </div>
          ))}
          <div style={{background:"#1A1A1A",borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{color:"#555",fontFamily:"DM Mono,monospace",fontSize:9,letterSpacing:1}}>TOTAL TODAY</div><div style={{color:"#555",fontFamily:"DM Mono,monospace",fontSize:9,marginTop:2}}>P {Math.round(totals.pro)}g · C {Math.round(totals.carb)}g · F {Math.round(totals.fat)}g</div></div>
            <div style={{textAlign:"right"}}><div style={{fontFamily:"DM Mono,monospace",fontSize:22,color:remaining<0?"#E85D26":"#fff",fontWeight:600,lineHeight:1}}>{totals.cal.toLocaleString()}</div><div style={{fontSize:8,color:"#444",fontFamily:"DM Mono,monospace",letterSpacing:1}}>/ {CALORIE_TARGET} kcal</div></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PROGRESS TAB ─────────────────────────────────────────────────────────────
function ProgressTab({foodLogs,dailyLogs,baseDate}){
  const days=[];const base=new Date(baseDate+"T12:00:00");
  for(let i=27;i>=0;i--){
    const d=new Date(base);d.setDate(d.getDate()-i);
    const key=d.toISOString().split("T")[0];
    const dl=dailyLogs[key]||{},food=foodLogs[key]||[];
    const cals=food.reduce((s,i)=>s+(i.calories||0),0);
    days.push({key,label:d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}),bw:dl.bodyweight?parseFloat(dl.bodyweight):null,cals});
  }
  const bwDays=days.filter(d=>d.bw!==null);
  const last7Cal=days.filter(d=>d.cals>0).slice(-7);
  const avgCal=last7Cal.length?Math.round(last7Cal.reduce((s,d)=>s+d.cals,0)/last7Cal.length):0;
  const bwChart=(()=>{
    if(bwDays.length<2)return null;
    const pts=bwDays.slice(-14),vals=pts.map(d=>d.bw);
    const mn=Math.min(...vals)-0.5,mx=Math.max(...vals)+0.5,W=320,H=70;
    const xs=pts.map((_,i)=>16+(i/Math.max(pts.length-1,1))*(W-32));
    const ys=pts.map(d=>H-8-((d.bw-mn)/(mx-mn))*(H-16));
    const latest=vals[vals.length-1],diff=(latest-vals[0]).toFixed(1);
    return{pts,xs,ys,latest,diff,W,H};
  })();
  return(
    <div>
      <div style={{background:"#fff",borderRadius:14,padding:"16px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:12}}>BODYWEIGHT</div>
        {bwChart?(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12}}>
              <div><div style={{fontFamily:"DM Mono,monospace",fontSize:32,fontWeight:800,lineHeight:1}}>{bwChart.latest}<span style={{fontSize:14,fontWeight:400,color:"#AAA"}}> kg</span></div><div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginTop:4}}>Target: 92–95 kg by August</div></div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"DM Mono,monospace",fontSize:18,fontWeight:800,color:parseFloat(bwChart.diff)<0?"#2D7A4F":"#C0392B"}}>{parseFloat(bwChart.diff)<0?"▼":"▲"} {Math.abs(bwChart.diff)}<span style={{fontSize:11,fontWeight:400}}> kg</span></div><div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginTop:2}}>since first log</div></div>
            </div>
            <svg width="100%" viewBox={`0 0 ${bwChart.W} ${bwChart.H}`} style={{overflow:"visible",display:"block"}}>
              <polyline points={bwChart.xs.map((x,i)=>`${x},${bwChart.ys[i]}`).join(" ")} fill="none" stroke="#E85D26" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              {bwChart.pts.map((_,i)=><circle key={i} cx={bwChart.xs[i]} cy={bwChart.ys[i]} r="4" fill="#E85D26"/>)}
              {bwChart.pts.map((d,i)=><text key={i} x={bwChart.xs[i]} y={bwChart.ys[i]-9} textAnchor="middle" fontSize="8" fill="#888" fontFamily="DM Mono,monospace">{d.bw}</text>)}
            </svg>
          </>
        ):(
          <div style={{textAlign:"center",padding:"24px 0",color:"#CCC",fontFamily:"DM Mono,monospace",fontSize:12}}>Log your morning weight on the Today tab to track progress</div>
        )}
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"16px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:12}}>CALORIE INTAKE — LAST 7 DAYS</div>
        {avgCal>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div><div style={{fontFamily:"DM Mono,monospace",fontSize:22,fontWeight:700,lineHeight:1,color:avgCal<=CALORIE_TARGET?"#2D7A4F":"#C0392B"}}>{avgCal.toLocaleString()}</div><div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginTop:4}}>avg daily kcal</div></div><div style={{textAlign:"right"}}><div style={{fontFamily:"DM Mono,monospace",fontSize:13,fontWeight:700,color:avgCal<=CALORIE_TARGET?"#2D7A4F":"#C0392B"}}>{avgCal<=CALORIE_TARGET?"On track ✓":"Over target"}</div><div style={{fontSize:9,color:"#AAA",fontFamily:"DM Mono,monospace",marginTop:2}}>target {CALORIE_TARGET} kcal</div></div></div>}
        {last7Cal.length===0&&<div style={{textAlign:"center",padding:"16px 0",color:"#CCC",fontFamily:"DM Mono,monospace",fontSize:12}}>No food logged yet this week</div>}
        {last7Cal.map(d=>(
          <div key={d.key} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#888"}}>{d.label}</div><div style={{fontFamily:"DM Mono,monospace",fontSize:10,fontWeight:700,color:d.cals<=CALORIE_TARGET?"#2D7A4F":"#C0392B"}}>{d.cals.toLocaleString()} kcal</div></div>
            <div style={{height:6,background:"#EDE8E0",borderRadius:3}}><div style={{height:6,borderRadius:3,background:d.cals<=CALORIE_TARGET?"#2D7A4F":"#C0392B",width:`${Math.min(d.cals/CALORIE_TARGET*100,100)}%`,transition:"width 0.5s"}}/></div>
          </div>
        ))}
      </div>
      <div style={{fontSize:9,letterSpacing:1,color:"#AAA",fontFamily:"DM Mono,monospace",marginBottom:10}}>DAILY LOG</div>
      {[...days].reverse().filter(d=>d.bw!==null||d.cals>0).slice(0,20).map(d=>(
        <div key={d.key} style={{background:"#fff",borderRadius:11,padding:"11px 14px",marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:600,fontSize:12,marginBottom:3}}>{d.label}</div>{d.bw&&<div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#888"}}>⚖ {d.bw} kg</div>}</div>
            <div style={{textAlign:"right"}}>{d.cals>0&&<div style={{fontFamily:"DM Mono,monospace",fontSize:13,fontWeight:600,color:d.cals<=CALORIE_TARGET?"#2D7A4F":"#C0392B"}}>{d.cals.toLocaleString()} kcal</div>}{d.cals===0&&<div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#CCC"}}>no food logged</div>}</div>
          </div>
          {d.cals>0&&<div style={{height:3,background:"#EDE8E0",borderRadius:2,marginTop:8}}><div style={{height:3,borderRadius:2,background:d.cals<=CALORIE_TARGET?"#2D7A4F":"#C0392B",width:`${Math.min(d.cals/CALORIE_TARGET*100,100)}%`,transition:"width 0.5s"}}/></div>}
        </div>
      ))}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
